# auto-theme.conf — override auto-theme.sh defaults
# Copy to auto-theme.conf.local for personal tweaks (gitignored).
# Values here override the script's built-in defaults.

LIGHT_SHADER="crt-phosphor-paper.glsl"   # shader used during day
DARK_SHADER="crt-phosphor-amber.glsl"    # shader used at night
LIGHT_THEME="phosphor-paper"              # Ghostty theme used during day
DARK_THEME="phosphor-amber"               # Ghostty theme used at night
LIGHT_START=7                             # hour (0-23) light mode begins
DARK_START=19                             # hour (0-23) dark mode begins
